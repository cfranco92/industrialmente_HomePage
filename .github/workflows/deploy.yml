name: Deploy

on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: deploy-live
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Load Firebase credentials
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_INDUSTRIALMENTE_2 }}' > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@15.14.0 deploy --only hosting --project industrialmente-2 --non-interactive
